          <article class="card">
            <h3 class="card__title" data-tr="TARAYICI PARMAK İZİNE DAYALI CİHAZ TANIMA" data-en="DEVICE RECOGNITION BASED ON BROWSER FINGERPRINTING"></h3>
            <p class="card__desc" data-tr="Bu projede, çerezlerin ve geleneksel takip yöntemlerinin kısıtlandığı modern web 
              ortamında cihazları güvenilir bir şekilde tanıyabilmek için kural tabanlı mantık ile makine öğrenimini birleştiren 
              hibrit bir tarayıcı parmak izi (browser fingerprinting) eşleştirme sistemi geliştirdik. Parmak izi özniteliklerinin 
              zaman içindeki değişimini ve belirleyiciliğini analiz edip, oluşturduğumuz bu iki aşamalı yapıyla sistemin yanlış 
              eşleştirme oranını büyük ölçüde düşürdük. Böylece sadece sabit kurallara bağlı kalmadan, zamanla değişen tarayıcı 
              profillerini yüksek doğrulukla ve gizlilik standartlarına uygun bir şekilde takip edebilen daha esnek ve güçlü bir 
              altyapı ortaya koyduk." 
              data-en="In this project, we developed a hybrid browser fingerprinting matching system that combines rule-based logic 
              with machine learning to reliably identify devices in the modern web environment where cookies and traditional tracking 
              methods are restricted. We analyzed the temporal changes and determinability of fingerprint attributes, and with this two-stage
              structure we created, we significantly reduced the system's false matching rate. Thus, we established a more flexible and 
              powerful infrastructure that can track changing browser profiles over time with high accuracy and in compliance with privacy 
              standards, without relying solely on fixed rules.">
            </p>
            <div class="card__tags">
              <span>Python</span><span>Machine Learning</span><span>MongoDB</span><span>LightGBM</span><span>Random Forest</span>
            </div>
            <div class="card__links">
              <a href="/assets/poster.pdf" target="_blank" rel="noopener">Poster →</a>
            </div>
          </article>

            </p>
